# docker-compose.yml — spins up the full TaskFlow stack with a single command.
# Run: docker compose up
# App available at: http://localhost:3000

services:
  # ── PostgreSQL database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    volumes:
      # Named volume persists data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Seed script runs automatically when the DB is first initialized
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow} -d ${POSTGRES_DB:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Go API backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # DATABASE_URL uses the postgres service name as hostname (Docker DNS)
      DATABASE_URL: postgres://${POSTGRES_USER:-taskflow}:${POSTGRES_PASSWORD:-taskflow_secret}@postgres:5432/${POSTGRES_DB:-taskflow}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8080}:8080"
    # Only start backend after postgres is healthy (passes healthcheck)
    depends_on:
      postgres:
        condition: service_healthy

  # ── React frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The frontend talks to the backend via nginx proxy (same origin)
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

# Named volume so Postgres data survives container restarts
volumes:
  postgres_data:
