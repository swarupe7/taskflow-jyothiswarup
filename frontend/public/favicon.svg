<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Green rounded-square background -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Sprout / leaf shape drawn as a path -->
  <!-- Stem -->
  <path d="M16 24 L16 14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M16 18 C16 18 10 17 9 12 C9 12 15 11 16 16" fill="white" opacity="0.9"/>
  <!-- Right leaf -->
  <path d="M16 15 C16 15 22 14 23 9 C23 9 17 8 16 13" fill="white"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
</svg>
