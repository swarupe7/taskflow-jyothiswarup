server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the Go backend.
    # This mirrors the Vite dev proxy so Docker production works identically.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other paths → serve React SPA (React Router handles client-side navigation)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (content hashes in filenames guarantee freshness)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
